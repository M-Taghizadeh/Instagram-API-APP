<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اتصال — محتوام</title>
<script>(function(){var t=localStorage.getItem('mohtavam-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/vazirmatn/vazirmatn.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-page">

<div class="connect-card">
  <div class="connect-title">اتصال با کپی لینک</div>
  <div class="connect-sub">در Chrome تب جدید باز کن، لینک را paste کن، Allow را بزن</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <button type="button" class="ig-btn" style="background:var(--primary);margin-bottom:10px;" data-copy="{{ oauth_url }}">
    کپی لینک اتصال
  </button>
  <button type="button" class="ig-btn" style="background:var(--surface-2);color:var(--text);border:1px solid var(--border);" data-copy="{{ instagram_login_url }}">
    کپی instagram.com
  </button>

  <div class="connect-foot">
    <a href="{{ back_url }}" class="connect-link">بازگشت</a>
    ·
    <a href="{{ url_for('oauth.connect_direct') }}" class="connect-link">اتصال مستقیم</a>
  </div>
</div>

<script>
document.querySelectorAll('[data-copy]').forEach(function(btn) {
  var label = btn.textContent;
  btn.addEventListener('click', async function() {
    var t = btn.getAttribute('data-copy');
    try { await navigator.clipboard.writeText(t); } catch (e) {
      var a = document.createElement('textarea'); a.value = t; document.body.appendChild(a); a.select(); document.execCommand('copy'); a.remove();
    }
    btn.textContent = 'کپی شد ✓';
    setTimeout(function() { btn.textContent = label; }, 2000);
  });
});
</script>
</body>
</html>

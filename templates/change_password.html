{% extends "base.html" %}
{% from "macros/ui.html" import icon %}
{% block title %}تغییر رمز عبور — محتوام{% endblock %}
{% block topbar_title %}تغییر رمز عبور{% endblock %}
{% block content %}

<div style="max-width:480px;margin:0 auto;">
  <div class="page-header">
    <div>
      <div class="page-title">{{ icon('key-round', 22) }} تغییر رمز عبور</div>
      <div class="page-sub">برای امنیت بیشتر از رمز قوی استفاده کن.</div>
    </div>
  </div>

  <form method="post">
    <div class="card">
      <div class="card-shine"></div>

      <div class="field">
        <label>رمز عبور فعلی</label>
        <input type="password" name="current_password" placeholder="••••••••" required>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>رمز عبور جدید</label>
        <input type="password" name="new_password" placeholder="حداقل ۶ کاراکتر" required minlength="6">
      </div>
      <div class="field">
        <label>تکرار رمز جدید</label>
        <input type="password" name="confirm_password" placeholder="••••••••" required>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn">{{ icon('save', 16) }} ذخیره رمز جدید</button>
        <a href="{{ url_for('settings.settings') }}" class="btn secondary">انصراف</a>
      </div>
    </div>
  </form>
</div>

{% endblock %}

{% from "macros/ui.html" import favicon_links %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — محتوام</title>
{{ favicon_links() }}
<script>(function(){var t=localStorage.getItem('mohtavam-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/vazirmatn/vazirmatn.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<style>
.error-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.error-card {
  max-width: 420px; width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px 28px; text-align: center; box-shadow: var(--shadow);
}
.error-code { font-size: 48px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 12px; }
.error-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
.error-msg { font-size: 14px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 24px; }
.error-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.error-actions a {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; text-decoration: none;
}
.error-actions .primary { background: var(--primary); color: #fff; }
.error-actions .secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
</style>
</head>
<body class="auth-page">
<div class="error-wrap">
  <div class="error-card">
    <div class="error-code">{{ code }}</div>
    <div class="error-title">{{ title }}</div>
    <p class="error-msg">{{ message }}</p>
    <div class="error-actions">
      <a href="javascript:location.reload()" class="primary">تلاش دوباره</a>
      <a href="{{ url_for('main.home') }}" class="secondary">صفحه اصلی</a>
      {% if show_login %}
      <a href="{{ url_for('auth.login') }}" class="secondary">ورود</a>
      {% endif %}
    </div>
  </div>
</div>
</body>
</html>

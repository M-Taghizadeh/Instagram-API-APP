<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود — اتومیشن اینستاگرام</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0e0c13;
    --panel:     #181522;
    --panel-2:   #1f1b2e;
    --border:    #2e2840;
    --text:      #ede9f8;
    --text-dim:  #8a82a0;
    --accent:    #e0417f;
    --accent-2:  #6c4fff;
    --accent-grad: linear-gradient(135deg, #e0417f 0%, #6c4fff 100%);
    --ok:        #34d399;
    --danger:    #f87171;
    --radius:    14px;
    --radius-sm: 9px;
    --tr:        .15s ease;
  }
  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ── subtle grid bg ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,79,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,79,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    position: relative;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .login-logo-icon {
    width: 44px;
    height: 44px;
    border-radius: 13px;
    background: var(--accent-grad);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 24px rgba(224,65,127,.35);
  }

  .login-logo-text { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
  .login-logo-sub  { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

  h1 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .subtitle { font-size: 13.5px; color: var(--text-dim); margin-bottom: 28px; }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 7px;
  }

  input[type=text], input[type=password] {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color var(--tr), box-shadow var(--tr);
  }

  input:focus {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 3px rgba(108,79,255,.14);
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 22px;
    cursor: pointer;
  }

  .remember input[type=checkbox] {
    width: 16px; height: 16px;
    accent-color: var(--accent-2);
    cursor: pointer;
  }

  .btn-login {
    width: 100%;
    background: var(--accent-grad);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(224,65,127,.28);
    transition: opacity var(--tr), transform var(--tr);
  }

  .btn-login:hover  { opacity: .88; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }

  .flash {
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    margin-bottom: 20px;
    font-size: 13.5px;
    font-weight: 500;
  }

  .flash.error   { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--danger); }
  .flash.success { background: rgba(52,211,153,.1);  border: 1px solid rgba(52,211,153,.3);  color: var(--ok); }
</style>
</head>
<body>
<div class="login-box">

  <div class="login-logo">
    <div class="login-logo-icon">⚡</div>
    <div>
      <div class="login-logo-text">اتومیشن اینستاگرام</div>
      <div class="login-logo-sub">پنل مدیریت</div>
    </div>
  </div>

  <h1>خوش اومدی</h1>
  <p class="subtitle">برای ادامه وارد حساب کاربری‌ات شو.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post">
    <div class="field">
      <label for="username">نام کاربری</label>
      <input type="text" id="username" name="username" placeholder="admin" required autofocus>
    </div>
    <div class="field">
      <label for="password">رمز عبور</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>
    <label class="remember">
      <input type="checkbox" name="remember"> مرا به خاطر بسپار
    </label>
    <button type="submit" class="btn-login">ورود به پنل</button>
  </form>

</div>
</body>
</html>

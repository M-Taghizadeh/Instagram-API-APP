{% from "macros/ui.html" import favicon_links, brand_mark %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثبت‌نام — محتوام</title>
{{ favicon_links() }}
<script>(function(){var t=localStorage.getItem('mohtavam-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/vazirmatn/vazirmatn.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-page">

<button type="button" class="icon-btn auth-theme-toggle" onclick="toggleTheme()" aria-label="تغییر تم">
  <i data-theme-icon="sun" data-lucide="sun" style="width:18px;height:18px;display:none"></i>
  <i data-theme-icon="moon" data-lucide="moon" style="width:18px;height:18px"></i>
</button>

<div class="connect-card" style="text-align:right;">
  <div class="auth-brand" style="justify-content:center;margin-bottom:28px;">
    <div class="auth-brand-mark">{{ brand_mark(40) }}</div>
    <div>
      <div class="auth-brand-name">محتوام</div>
    </div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">
        <i data-lucide="{% if category == 'error' %}alert-circle{% else %}check-circle{% endif %}" style="width:16px;height:16px"></i>
        {{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <form method="post">
    <div class="field">
      <label>نام کاربری</label>
      <input type="text" name="username" required minlength="3" autofocus>
    </div>
    <div class="field">
      <label>رمز عبور</label>
      <input type="password" name="password" required minlength="6">
    </div>
    <div class="field">
      <label>تکرار رمز</label>
      <input type="password" name="confirm_password" required minlength="6">
    </div>
    <input type="hidden" name="email" value="">
    <button type="submit" class="btn-auth">ساخت حساب</button>
  </form>

  <div class="connect-foot" style="text-align:center;">
    حساب داری؟ <a href="{{ url_for('auth.login') }}" class="connect-link" style="color:var(--primary);">ورود</a>
  </div>
</div>

<script src="{{ url_for('static', filename='vendor/lucide/lucide.min.js') }}" defer></script>
<script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
